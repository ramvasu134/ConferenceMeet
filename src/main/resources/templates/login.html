<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#d4790e">
    <meta name="format-detection" content="telephone=no">
    <title>MTNG - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdf0e2 0%, #fce4cc 40%, #fdd9b5 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-text-size-adjust: 100%;
        }
        html { height: -webkit-fill-available; }
        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 50px 44px 40px;
            width: 430px;
            max-width: 92%;
            box-shadow: 0 8px 40px rgba(180, 120, 60, 0.12), 0 2px 12px rgba(0,0,0,0.04);
            text-align: center;
        }
        .logo-icon {
            width: 72px; height: 72px;
            margin: 0 auto 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase;
            background: linear-gradient(135deg, #d4790e, #c0520a, #a33a08);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 4px;
        }
        .tagline { font-size: 13px; color: #888; letter-spacing: 1px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label {
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 13px 16px;
            background: #fefefe; border: 1.5px solid #e0d5c8; border-radius: 10px;
            font-size: 16px; color: #333; outline: none; transition: 0.25s;
            font-family: 'Inter', sans-serif;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-group input::placeholder { color: #bbb; }
        .form-group input:focus { border-color: #d4790e; box-shadow: 0 0 0 3px rgba(212,121,14,0.12); }
        .password-wrapper { position: relative; }
        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #c0520a; font-size: 18px; background: none; border: none;
            opacity: 0.7; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-width: 44px; min-height: 44px;
            display: flex; align-items: center; justify-content: center;
        }
        .password-toggle:hover { opacity: 1; }
        .btn-signin {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #d4790e, #c0520a);
            border: none; border-radius: 10px; color: #fff;
            font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 6px; font-family: 'Inter', sans-serif; letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            min-height: 48px;
        }
        .btn-signin:hover { background: linear-gradient(135deg, #c0520a, #a33a08); box-shadow: 0 6px 20px rgba(192,82,10,0.35); transform: translateY(-1px); }
        .btn-signin:active { transform: scale(0.98); }
        .error-msg {
            background: #fef2f2; border: 1px solid #fca5a5; border-radius: 10px;
            padding: 12px; text-align: center; color: #b91c1c; margin-bottom: 18px; font-size: 14px;
        }
        .success-msg {
            background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px;
            padding: 12px; text-align: center; color: #166534; margin-bottom: 18px; font-size: 14px;
        }
        .card-footer { margin-top: 22px; padding-top: 18px; border-top: 1px solid #f0e8de; font-size: 13px; color: #999; }
        .card-footer a { color: #c0520a; text-decoration: none; font-weight: 600; }
        .card-footer a:hover { text-decoration: underline; }
        .secure-badge { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: #888; margin-top: 16px; }
        .version-tag { font-size: 11px; color: #bbb; margin-top: 6px; }
        /* Mobile-specific adjustments */
        @media (max-width: 480px) {
            .login-card { padding: 36px 24px 28px; border-radius: 20px; }
            .logo-text { font-size: 34px; }
            .form-group input { padding: 14px 16px; font-size: 16px; }
        }
        @media (max-height: 600px) {
            body { align-items: flex-start; padding-top: 20px; }
            .login-card { padding: 24px 20px; }
        }
        /* Prevent iOS zoom on input focus */
        @supports (-webkit-touch-callout: none) {
            .form-group input { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">📹</div>
        <div class="logo-text">MTNG</div>
        <div class="tagline">Meeting Platform</div>

        <div th:if="${param.error}" class="error-msg">
            Invalid username or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="success-msg">
            You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label>🔐 Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
                </div>
            </div>
            <button type="submit" class="btn-signin">🚀 Sign In</button>
        </form>

        <div class="secure-badge">🔒 Secure Session-Based Authentication</div>
        <div class="version-tag">MTNG v2.0 – Meeting Platform</div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
