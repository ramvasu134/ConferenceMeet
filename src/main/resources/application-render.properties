# ============================================================
# Render.com Production Profile
# Activated via: SPRING_PROFILES_ACTIVE=render
# ============================================================

# -- Server --
# Render injects $PORT - this MUST be used or the deploy fails
server.port=${PORT:10000}

# -- H2 Database (File-based with Render-safe settings) --
# Absolute path inside container - directory created by Dockerfile
spring.datasource.url=jdbc:h2:file:/opt/data/meetingsdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Increase H2 connection pool for production stability
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# -- H2 Console - DISABLED in production (security!) --
spring.h2.console.enabled=false

# -- Thymeleaf - ENABLE cache in production --
spring.thymeleaf.cache=true

# -- File upload (same as local) --
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# -- Session --
server.servlet.session.timeout=4h

# -- Logging --
logging.level.root=INFO
logging.level.com.school.MeetingsApp=INFO
logging.level.org.hibernate.SQL=WARN
